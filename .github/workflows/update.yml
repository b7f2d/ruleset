name: Convert AI List to Shadowrocket

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: 

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # 显式使用当前分支的 Token，提高权限稳定性
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download and Convert File
      run: |
        mkdir -p data
        
        # 1. 下载原始文件
        curl -sSL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.list" -o temp_raw.list
        
        # 2. 转换为小火箭纯域名规则集 (去掉了 + 和 . 以及后面的 PROXY)
        sed -e 's/^\+//g' -e 's/^\.//g' temp_raw.list | awk 'NF' > data/ai-ruleset.list
        
        rm temp_raw.list
        echo "纯域名转换完成"

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add data/ai-ruleset.list
        
        # 检查是否有内容变化，防止没有更新时引发 git 128 报错
        if git diff --staged --quiet; then
          echo "文件内容无变化，无需提交。"
        else
          git commit -m "自动更新域名列表: $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:${{ github.ref }}
        fi
