name: Convert AI List to Shadowrocket

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: 

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download and Convert File
      run: |
        mkdir -p data
        
        # 1. 下载原始文件
        curl -sSL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.list" -o temp_raw.list
        
        # 2. 清空或初始化目标文件
        > AI.list
        
        # 3. 逐行读取并智能转换前缀
        while IFS= read -r line || [ -n "$line" ]; do
          # 忽略空行和注释行
          [[ -z "$line" || "$line" =~ ^# ]] && continue
          
          # 去除行尾的换行符或空格
          line=$(echo "$line" | xargs)
          
          if [[ "$line" =~ ^\+\. ]] || [[ "$line" =~ ^\. ]]; then
            # 如果是 +. 或 . 开头，转换成 DOMAIN-SUFFIX，并去掉开头的符号
            clean_domain=$(echo "$line" | sed -e 's/^\+//g' -e 's/^\.//g')
            echo "DOMAIN-SUFFIX,${clean_domain}" >> data/ai-shadowrocket.list
          else
            # 如果是普通域名，转换成 DOMAIN
            echo "DOMAIN,${line}" >> data/ai-shadowrocket.list
          fi
        done < temp_raw.list
        
        rm temp_raw.list
        echo "转换完成，已成功保留小火箭对应的 DOMAIN/DOMAIN-SUFFIX 前缀"

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add data/ai-shadowrocket.list
        
        if git diff --staged --quiet; then
          echo "文件内容无变化，无需提交。"
        else
          git commit -m "自动更新域名列表: $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:${{ github.ref }}
        fi
