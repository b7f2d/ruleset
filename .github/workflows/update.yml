name: AI List

on:
  schedule:
    # 每天北京时间 12:00 运行 (UTC 时间 04:00)
    - cron: '0 4 * * *'
  workflow_dispatch: 

# 保持环境为最新的 Node.js 24，消除黄色警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download and Convert File
      run: |
        # 1. 下载原始文件
        curl -sSL "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.list" -o temp_raw.list
        
        # 2. 在根目录下正确初始化目标文件 AI.list
        > AI.list
        
        # 3. 逐行读取并智能转换为 Shadowrocket Domain Set 格式
        while IFS= read -r line || [ -n "$line" ]; do
          # 忽略空行和注释行
          [[ -z "$line" || "$line" =~ ^# ]] && continue
          
          # 去除行尾的换行符或空格
          line=$(echo "$line" | xargs)
          
          if [[ "$line" =~ ^\+\. ]]; then
            # 如果是 +. 开头，转换为 . 开头（小火箭中 . 开头代表匹配子域名）
            clean_domain=$(echo "$line" | sed 's/^\+//g')
            echo "${clean_domain}" >> AI.list
          else
            # 如果是 . 开头或者普通域名，直接写入，不加任何 DOMAIN 前缀
            echo "${line}" >> AI.list
          fi
        done < temp_raw.list
        
        rm temp_raw.list
        echo "转换完成，已成功在根目录生成适用于小火箭的 Domain Set 格式 AI.list"

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 4. 追踪根目录下的 AI.list 文件
        git add AI.list
        
        if git diff --staged --quiet; then
          echo "文件内容无变化，无需提交。"
        else
          git commit -m "自动更新域名列表: $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:${{ github.ref }}
        fi
