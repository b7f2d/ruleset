name: Update AI Rules

on:
workflow_dispatch:
schedule:
- cron: "0 4 * * *"

jobs:
update:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.12"

  - name: Download Rules
    run: |
      curl -L "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-%21cn.list" -o source.list

  - name: Convert
    run: |
      python3 convert.py

  - name: Commit Changes
    run: |
      git config user.name "github-actions"
      git config user.email "github-actions@github.com"

      git add .

      git commit -m "auto update" || exit 0

      git push
```
